<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chat — Dovai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="chat-page">
  <div class="chat-page-root">

    <aside class="chat-page-sidebar">
      <header class="chat-page-sidebar-header">
        <span class="chat-page-brand">◆ Dovai · Chat</span>
      </header>

      <section class="chat-page-sidebar-section">
        <button id="chat-new-btn" class="primary" style="width:100%;">+ New chat</button>
      </section>

      <section class="chat-page-sidebar-section">
        <label class="chat-page-label">Preset</label>
        <select id="chat-preset"></select>
        <div class="btn-row" style="margin-top:8px;flex-wrap:wrap;">
          <button id="chat-edit-preset" class="secondary">Edit</button>
          <button id="chat-new-preset" class="secondary">+ New</button>
          <button id="chat-delete-preset" class="danger-outline hidden">Delete</button>
        </div>
      </section>

      <section class="chat-page-sidebar-section">
        <label class="chat-page-label">Model</label>
        <select id="chat-model"></select>
      </section>

      <section class="chat-page-sidebar-section chat-page-sidebar-list-section">
        <label class="chat-page-label">Chats</label>
        <div id="chat-list" class="chat-list"></div>
      </section>
    </aside>

    <main class="chat-page-main">
      <header class="chat-page-topbar">
        <div id="chat-title" class="chat-title chat-page-title">Pick a chat or start a new one</div>
      </header>

      <div id="chat-messages" class="chat-messages">
        <div class="chat-empty muted">Pick a chat or start a new one.</div>
      </div>

      <footer class="chat-composer">
        <div id="chat-attached-images" class="chat-attached-images"></div>
        <div class="chat-composer-row">
          <label class="chat-attach-btn" title="Attach image(s)">
            📎
            <input type="file" id="chat-image-input" accept="image/*" multiple hidden>
          </label>
          <textarea id="chat-input" rows="3" placeholder="Message (Cmd/Ctrl+Enter to send)"></textarea>
          <button id="chat-send" class="primary">Send</button>
        </div>
      </footer>
    </main>
  </div>

  <!-- Preset editor modal -->
  <div id="chat-preset-modal" class="wizard-overlay hidden" aria-hidden="true">
    <div class="wizard-card" style="max-width:640px;">
      <h2 id="chat-preset-modal-title">Edit preset</h2>
      <label>Slug (file name, cannot change after create)
        <input id="chat-preset-slug" />
      </label>
      <label>Display name<input id="chat-preset-name" /></label>
      <label>Model<input id="chat-preset-model" /></label>
      <div style="display:flex;gap:8px;">
        <label style="flex:1;">Temperature<input id="chat-preset-temp" type="number" step="0.1" placeholder="0.7" /></label>
        <label style="flex:1;">Max tokens<input id="chat-preset-maxtok" type="number" placeholder="(default)" /></label>
      </div>
      <label>System prompt
        <textarea id="chat-preset-prompt" rows="12" style="font-family:'SF Mono','Menlo',monospace;font-size:13px;"></textarea>
      </label>
      <div class="wizard-error hidden" id="chat-preset-error"></div>
      <div class="btn-row" style="margin-top:16px;justify-content:space-between;">
        <button id="chat-preset-delete" class="danger-outline">Delete</button>
        <div class="btn-row">
          <button id="chat-preset-cancel" class="secondary">Cancel</button>
          <button id="chat-preset-save" class="primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast slot for flash messages -->
  <div id="chat-flash" class="chat-flash hidden"></div>

  <script src="/static/app.js" defer></script>
</body>
</html>
